<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SentinelConvert</title>
    <meta name="description" content="Convert any file to any format. Drop a file or folder and SentinelConvert will detect what it can become." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app">
      <header class="app-header">
        <span class="logo-mark">⬡</span>
        <h1 class="app-title">SentinelConvert</h1>
        <p class="app-sub">Drop a file or folder — we'll figure out the rest.</p>
      </header>

      <!-- Drop Zone -->
      <div id="dropZone" class="drop-zone" tabindex="0" role="button" aria-label="Upload file or folder">
        <div class="drop-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="drop-label">Click or drag files here</p>
        <p class="drop-sub">Single file or entire folder — supports images, video, audio, docs, archives, CSV/JSON</p>
        <input id="fileInput" type="file" multiple hidden />
        <input id="folderInput" type="file" webkitdirectory multiple hidden />
        <div class="drop-btns">
          <button type="button" id="btnPickFile" class="pick-btn">📄 Pick Files</button>
          <button type="button" id="btnPickFolder" class="pick-btn">📁 Pick Folder</button>
        </div>
      </div>

      <!-- File Queue -->
      <section id="fileQueue" class="file-queue hidden" aria-label="File queue">
        <div class="queue-header">
          <span id="queueCount" class="queue-count">0 files</span>
          <button type="button" id="btnClearAll" class="btn-ghost">Clear all</button>
          <button type="button" id="btnConvertAll" class="btn-primary">Convert All</button>
        </div>
        <ul id="fileList" class="file-list" aria-label="Files to convert"></ul>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
