<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SentinelConvert — Free Student Toolkit</title>
    <meta name="description" content="Free online tools for students: Merge PDF, Split PDF, Convert images, Remove backgrounds, and more — 100% in your browser, no upload needed." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6189259537245687" crossorigin="anonymous"></script>

    <!-- COI Service Worker for SharedArrayBuffer (ffmpeg.wasm) -->
    <script src="coi-serviceworker.js"></script>
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-orb orb-c"></div>

    <!-- The entire app renders here -->
    <main id="app"></main>

    <!-- CDN Libraries (lightweight ones loaded upfront) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <script src="app.js" defer></script>
    <script src="tools/pdf-tools.js" defer></script>
    <script src="tools/pdf-convert.js" defer></script>
    <script src="tools/image-tools.js" defer></script>
    <script src="tools/data-tools.js" defer></script>
  </body>
</html>
